<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emini Ethan — Trade Log</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f0f;--s1:#161616;--s2:#1e1e1e;--s3:#252525;
  --b1:#2a2a2a;--b2:#383838;
  --t1:#e8e8e8;--t2:#888;--t3:#555;
  --green:#4ade80;--gdim:#1a3d27;--gtext:#86efac;
  --red:#f87171;--rdim:#3d1a1a;--rtext:#fca5a5;
  --amber:#fbbf24;--adim:#3d2e0a;--atext:#fcd34d;
  --blue:#60a5fa;--bdim:#1a2a3d;--btext:#93c5fd;
  --accent:#c8ff00;
  --purple:#a78bfa;--pdim:#1e1a3d;
  --teal:#5eead4;--tdim:#1a2e2e;
  --pink:#e879f9;--pinkdim:#2e1a2e;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--t1);font-size:13px;min-height:100vh}

/* NAV */
nav{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--b1);padding:0 20px;height:44px;position:sticky;top:0;background:var(--bg);z-index:50}
.nav-logo{font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.04em;margin-right:20px}
.nav-tab{padding:0 14px;height:44px;display:flex;align-items:center;font-size:12.5px;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.nav-tab:hover{color:var(--t2)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.sync-btn{padding:5px 12px;border-radius:5px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:12px;cursor:pointer}
.sync-btn:hover{background:var(--s2);color:var(--t1)}
.sync-status{font-size:11px;color:var(--t3)}

/* PAGES */
.page{display:none;padding:24px 24px}
.page.active{display:block}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:12px 14px}
.stat-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.stat-val{font-size:20px;font-weight:500;font-family:monospace}
.stat-val.pos{color:var(--green)}.stat-val.neg{color:var(--red)}
.stat-sub{font-size:10px;color:var(--t3);margin-top:3px}

/* SECTION */
.sec-title{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}

/* TABLE */
.table-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:8px;overflow:auto;margin-bottom:16px}
table{width:100%;border-collapse:collapse;min-width:700px}
thead tr{border-bottom:1px solid var(--b1)}
th{padding:8px 12px;text-align:left;font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--b1);cursor:pointer;transition:background .1s}
tbody tr:hover{background:var(--s2)}
tbody tr:last-child{border-bottom:none}
td{padding:9px 12px;font-size:12.5px}
.mono{font-family:monospace}
.pos{color:var(--green)}.neg{color:var(--red)}

/* TAGS */
.tag{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}
.tag.call{background:var(--bdim);color:var(--btext)}
.tag.put{background:var(--adim);color:var(--atext)}
.tag.long{background:var(--gdim);color:var(--gtext)}
.tag.short{background:var(--rdim);color:var(--rtext)}
.tag.open{background:var(--s3);color:var(--t2)}
.tag.close{background:var(--gdim);color:var(--gtext)}
.tag.scalein{background:var(--pdim);color:var(--purple)}
.tag.trim{background:var(--adim);color:var(--atext)}

/* SETUP BREAKDOWN */
.breakdown{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:14px 16px;margin-bottom:16px}
.setup-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.setup-row:last-child{margin-bottom:0}
.setup-name{width:100px;font-size:12px;color:var(--t2);display:flex;align-items:center;gap:6px}
.bar-track{flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.setup-wr{font-size:11px;font-family:monospace;color:var(--t3);width:32px;text-align:right}
.setup-pl{font-size:11px;font-family:monospace;width:64px;text-align:right}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}

/* FORM */
.form-card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:20px}
.form-title{font-size:15px;font-weight:500;margin-bottom:16px}
.mode-toggle{display:flex;gap:0;background:var(--s2);border-radius:6px;padding:3px;margin-bottom:20px;width:fit-content}
.mode-btn{padding:6px 20px;border-radius:4px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--t3);transition:all .15s}
.mode-btn.active{background:var(--s3);color:var(--t1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.form-row.full{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{
  padding:8px 10px;border-radius:6px;border:1px solid var(--b1);
  background:var(--s2);color:var(--t1);font-size:13px;
  font-family:system-ui,sans-serif;outline:none;
  transition:border .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--b2)}
.field select option{background:var(--s2)}
.field textarea{resize:vertical;min-height:72px}
.submit-btn{width:100%;padding:10px;border-radius:7px;background:var(--accent);color:#000;font-size:13px;font-weight:600;border:none;cursor:pointer;margin-top:8px;letter-spacing:.02em}
.submit-btn:hover{background:#d4ff00}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.form-msg{text-align:center;font-size:12px;margin-top:10px;min-height:18px}
.form-msg.ok{color:var(--green)}.form-msg.err{color:var(--red)}

/* PIP EXEC */
.pips{display:flex;gap:2px}
.pip{width:6px;height:6px;border-radius:1px;background:var(--b1)}
.pip.on{background:var(--accent)}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--t3);font-size:12px}
</style>
</head>
<body>

<nav>
  <span class="nav-logo">EMINI ETHAN</span>
  <div class="nav-tab active" onclick="showPage('dashboard')">Dashboard</div>
  <div class="nav-tab" onclick="showPage('futures-log')">Futures</div>
  <div class="nav-tab" onclick="showPage('options-log')">Options</div>
  <div class="nav-tab" onclick="showPage('entry')">+ Log Trade</div>
  <div class="nav-right">
    <span class="sync-status" id="sync-status">—</span>
    <button class="sync-btn" onclick="loadData()">↻ Sync</button>
  </div>
</nav>

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">
  <div id="dash-content"><div class="loading">Loading your data...</div></div>
</div>

<!-- FUTURES LOG -->
<div class="page" id="page-futures-log">
  <div id="futures-content"><div class="loading">Loading...</div></div>
</div>

<!-- OPTIONS LOG -->
<div class="page" id="page-options-log">
  <div id="options-content"><div class="loading">Loading...</div></div>
</div>

<!-- ENTRY FORM -->
<div class="page" id="page-entry">
  <div style="max-width:560px">
    <div class="form-card">
      <div class="form-title">Log a trade</div>
      <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('futures')">Futures</button>
        <button class="mode-btn" onclick="setMode('options')">Options</button>
      </div>

      <!-- FUTURES FORM -->
      <div id="futures-form">
        <div class="form-row">
          <div class="field"><label>Date</label><input type="date" id="f-date"></div>
          <div class="field"><label>Ticker</label>
            <select id="f-ticker"><option>MES</option><option>ES</option></select>
          </div>
        </div>
        <div class="form-row three">
          <div class="field"><label>Trade #</label><input type="number" id="f-tradenum" placeholder="1"></div>
          <div class="field"><label>Type</label>
            <select id="f-type"><option>open</option><option>close</option><option>scale in</option><option>trim</option></select>
          </div>
          <div class="field"><label>Side</label>
            <select id="f-side"><option>long</option><option>short</option></select>
          </div>
        </div>
        <div class="form-row three">
          <div class="field"><label>Price</label><input type="number" id="f-price" step="0.25" placeholder="6450.00"></div>
          <div class="field"><label>QTY</label><input type="number" id="f-qty" placeholder="2"></div>
          <div class="field"><label>Matched Row</label><input type="number" id="f-matchrow" placeholder="leave blank if open"></div>
        </div>
        <div class="form-row full">
          <div class="field"><label>Setup</label>
            <select id="f-setup">
              <option value="">— Select setup —</option>
              <option>FVG Reclaim</option>
              <option>Liquidity Sweep</option>
              <option>Fractal Confirm</option>
              <option>Equal Levels</option>
              <option>Dealer Hedge Level</option>
              <option>Other</option>
            </select>
          </div>
        </div>
        <div class="form-row full">
          <div class="field"><label>Notes / Reasoning</label><textarea id="f-notes" placeholder="Quick dump — what did you see, why did you enter or exit?"></textarea></div>
        </div>
        <div class="form-row">
          <div class="field"><label>Execution Quality (1–5)</label>
            <select id="f-exec"><option value="5">5 — Textbook</option><option value="4">4 — Sharp</option><option value="3" selected>3 — Decent</option><option value="2">2 — Hesitated</option><option value="1">1 — Blown</option></select>
          </div>
        </div>
      </div>

      <!-- OPTIONS FORM -->
      <div id="options-form" style="display:none">
        <div class="form-row">
          <div class="field"><label>Date</label><input type="date" id="o-date"></div>
          <div class="field"><label>Ticker</label>
            <select id="o-ticker"><option>SPY</option><option>SPX</option><option>QQQ</option></select>
          </div>
        </div>
        <div class="form-row three">
          <div class="field"><label>Strike</label><input type="number" id="o-strike" placeholder="680"></div>
          <div class="field"><label>Side</label>
            <select id="o-side"><option>call</option><option>put</option></select>
          </div>
          <div class="field"><label>QTY</label><input type="number" id="o-qty" placeholder="10"></div>
        </div>
        <div class="form-row three">
          <div class="field"><label>Expiry</label><input type="date" id="o-exp"></div>
          <div class="field"><label>Avg Entry $</label><input type="number" id="o-entry" step="0.01" placeholder="0.45"></div>
          <div class="field"><label>Avg Exit $</label><input type="number" id="o-exit" step="0.01" placeholder="0.89"></div>
        </div>
        <div class="form-row full">
          <div class="field"><label>Setup</label>
            <select id="o-setup">
              <option value="">— Select setup —</option>
              <option>FVG Reclaim</option>
              <option>Liquidity Sweep</option>
              <option>Fractal Confirm</option>
              <option>Equal Levels</option>
              <option>Dealer Hedge Level</option>
              <option>0DTE Momentum</option>
              <option>Other</option>
            </select>
          </div>
        </div>
        <div class="form-row full">
          <div class="field"><label>Notes / Reasoning</label><textarea id="o-notes" placeholder="Quick dump — what did you see, why did you enter or exit?"></textarea></div>
        </div>
        <div class="form-row">
          <div class="field"><label>Execution Quality (1–5)</label>
            <select id="o-exec"><option value="5">5 — Textbook</option><option value="4">4 — Sharp</option><option value="3" selected>3 — Decent</option><option value="2">2 — Hesitated</option><option value="1">1 — Blown</option></select>
          </div>
        </div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitTrade()">Submit to Sheet</button>
      <div class="form-msg" id="form-msg"></div>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx8Cv6xpAxGB0La3SJJ8uuTuGrgjDuFa_J-SF0sTFM-wIO11fc_08XRPu6rQT3VAtrW/exec';
let mode = 'futures';
let rawData = null;

// Set today's date on form fields
function setTodayDates(){
  const today = new Date().toISOString().split('T')[0];
  ['f-date','o-date','o-exp'].forEach(id=>{
    const el = document.getElementById(id);
    if(el && !el.value) el.value = today;
  });
}
setTodayDates();

function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  event.target.classList.add('active');
}

function setMode(m){
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('futures-form').style.display = m==='futures'?'block':'none';
  document.getElementById('options-form').style.display = m==='options'?'block':'none';
}

function fmt(n){
  if(n===null||n===undefined||n==='') return '—';
  const v = parseFloat(n);
  if(isNaN(v)) return '—';
  return (v>=0?'+$':'-$')+Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtPct(n){
  if(n===null||n===undefined||n==='') return '—';
  const v = parseFloat(n);
  if(isNaN(v)) return '—';
  return (v>=0?'+':'')+(v*100).toFixed(1)+'%';
}
function fmtDate(d){
  if(!d) return '—';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return (dt.getUTCMonth()+1)+'/'+(dt.getUTCDate());
}
function pips(n){
  let h='<div class="pips">';
  for(let i=1;i<=5;i++) h+=`<div class="pip${i<=n?' on':''}"></div>`;
  return h+'</div>';
}
function sideTag(s){
  const c=s?s.toLowerCase().replace(/\s/g,''):'';
  return `<span class="tag ${c}">${s||'—'}</span>`;
}
function typeTag(t){
  const c=t?t.toLowerCase().replace(/\s/g,''):'';
  return `<span class="tag ${c}">${t||'—'}</span>`;
}

async function loadData(){
  document.getElementById('sync-status').textContent='Syncing...';
  try{
    const r = await fetch(SCRIPT_URL);
    rawData = await r.json();
    document.getElementById('sync-status').textContent='Last sync: '+new Date().toLocaleTimeString();
    renderDash();
    renderFutures();
    renderOptions();
  }catch(e){
    document.getElementById('sync-status').textContent='Sync failed';
    console.error(e);
  }
}

function renderDash(){
  if(!rawData) return;

  // Parse futures closes
  const futRows = rawData.futures.slice(1).filter(r=>r[3]==='close'&&r[8]!=='');
  const futPLs = futRows.map(r=>parseFloat(r[8])||0);
  const futTotal = futPLs.reduce((a,b)=>a+b,0);
  const futWins = futPLs.filter(v=>v>0).length;
  const futWR = futPLs.length ? Math.round(futWins/futPLs.length*100) : 0;

  // Parse options
  const optRows = rawData.options.slice(1).filter(r=>r[0]&&r[8]!=='');
  const optPLs = optRows.map(r=>parseFloat(r[8])||0);
  const optTotal = optPLs.reduce((a,b)=>a+b,0);
  const optWins = optPLs.filter(v=>v>0).length;
  const optWR = optPLs.length ? Math.round(optWins/optPLs.length*100) : 0;

  const combined = futTotal+optTotal;

  // Setup breakdown from futures
  const setups={};
  rawData.futures.slice(1).filter(r=>r[3]==='close'&&r[8]!=='').forEach(r=>{
    const s = r[11]||'Untagged';
    if(!setups[s]) setups[s]={wins:0,total:0,pl:0};
    setups[s].total++;
    setups[s].pl+=parseFloat(r[8])||0;
    if((parseFloat(r[8])||0)>0) setups[s].wins++;
  });

  const setupColors={'FVG Reclaim':'#a78bfa','Liquidity Sweep':'#5eead4','Fractal Confirm':'#e879f9','Equal Levels':'#fcd34d','Dealer Hedge Level':'#7dd3fc','0DTE Momentum':'#60a5fa','Other':'#888','Untagged':'#555'};
  const maxPL = Math.max(...Object.values(setups).map(s=>Math.abs(s.pl)),1);

  document.getElementById('dash-content').innerHTML=`
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">Combined P/L</div><div class="stat-val ${combined>=0?'pos':'neg'}">${fmt(combined)}</div><div class="stat-sub">all accounts</div></div>
      <div class="stat"><div class="stat-label">Futures P/L</div><div class="stat-val ${futTotal>=0?'pos':'neg'}">${fmt(futTotal)}</div><div class="stat-sub">${futPLs.length} trades · ${futWR}% WR</div></div>
      <div class="stat"><div class="stat-label">Options P/L</div><div class="stat-val ${optTotal>=0?'pos':'neg'}">${fmt(optTotal)}</div><div class="stat-sub">${optPLs.length} trades · ${optWR}% WR</div></div>
      <div class="stat"><div class="stat-label">Fut Win Rate</div><div class="stat-val">${futWR}%</div><div class="stat-sub">${futWins}W / ${futPLs.length-futWins}L</div></div>
      <div class="stat"><div class="stat-label">Opt Win Rate</div><div class="stat-val">${optWR}%</div><div class="stat-sub">${optWins}W / ${optPLs.length-optWins}L</div></div>
    </div>

    <div class="two-col">
      <div>
        <div class="sec-title" style="margin-bottom:10px">Recent futures</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Ticker</th><th>Type</th><th>Price</th><th>P/L</th><th>Pts</th></tr></thead>
            <tbody>
              ${rawData.futures.slice(1).slice(-8).reverse().map(r=>`
                <tr>
                  <td class="mono" style="color:var(--t3)">${fmtDate(r[0])}</td>
                  <td style="font-weight:500;font-family:monospace">${r[1]||'—'}</td>
                  <td>${typeTag(r[3])}</td>
                  <td class="mono">${r[5]||'—'}</td>
                  <td class="mono ${parseFloat(r[8])>=0?'pos':'neg'}">${r[8]!==''?fmt(r[8]):'—'}</td>
                  <td class="mono" style="color:var(--t2)">${r[9]||'—'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
      <div>
        <div class="sec-title" style="margin-bottom:10px">Recent options</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Side</th><th>Strike</th><th>Entry</th><th>Exit</th><th>P/L</th></tr></thead>
            <tbody>
              ${optRows.slice(-8).reverse().map(r=>`
                <tr>
                  <td class="mono" style="color:var(--t3)">${fmtDate(r[0])}</td>
                  <td>${sideTag(r[4])}</td>
                  <td class="mono">${r[3]||'—'}</td>
                  <td class="mono">$${parseFloat(r[6]).toFixed(2)}</td>
                  <td class="mono">$${parseFloat(r[7]).toFixed(2)}</td>
                  <td class="mono ${parseFloat(r[8])>=0?'pos':'neg'}">${fmt(r[8])}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    ${Object.keys(setups).length>0?`
    <div class="sec-title">Setup breakdown (futures)</div>
    <div class="breakdown">
      ${Object.entries(setups).map(([name,s])=>{
        const wr=Math.round(s.wins/s.total*100);
        const col=s.pl>=0?'var(--green)':'var(--red)';
        const barW=Math.round(Math.abs(s.pl)/maxPL*100);
        return `<div class="setup-row">
          <span class="setup-name"><span style="width:7px;height:7px;border-radius:50%;background:${setupColors[name]||'#888'};display:inline-block;flex-shrink:0"></span>${name}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${barW}%;background:${col}"></div></div>
          <span class="setup-wr">${wr}%</span>
          <span class="setup-pl ${s.pl>=0?'pos':'neg'}">${fmt(s.pl)}</span>
        </div>`;
      }).join('')}
    </div>`:''}
  `;
}

function renderFutures(){
  if(!rawData) return;
  const rows = rawData.futures.slice(1);
  document.getElementById('futures-content').innerHTML=`
    <div class="sec-title">Personal Futures — all legs</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Date</th><th>Ticker</th><th>Trade #</th><th>Type</th><th>Side</th><th>Price</th><th>QTY</th><th>Mtch Row</th><th>P/L $</th><th>Points</th></tr></thead>
        <tbody>
          ${rows.map(r=>`<tr>
            <td class="mono" style="color:var(--t3)">${fmtDate(r[0])}</td>
            <td style="font-weight:500;font-family:monospace">${r[1]||'—'}</td>
            <td class="mono" style="color:var(--t2)">${r[2]||'—'}</td>
            <td>${typeTag(r[3])}</td>
            <td>${sideTag(r[4])}</td>
            <td class="mono">${r[5]||'—'}</td>
            <td class="mono" style="color:var(--t2)">${r[6]||'—'}</td>
            <td class="mono" style="color:var(--t3)">${r[7]||'—'}</td>
            <td class="mono ${parseFloat(r[8])>=0?'pos':'neg'}">${r[8]!==''?fmt(r[8]):'—'}</td>
            <td class="mono" style="color:var(--t2)">${r[9]||'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderOptions(){
  if(!rawData) return;
  const rows = rawData.options.slice(1).filter(r=>r[0]);
  document.getElementById('options-content').innerHTML=`
    <div class="sec-title">Robinhood Options — all trades</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Date</th><th>Ticker</th><th>QTY</th><th>Strike</th><th>Side</th><th>Exp</th><th>Avg Entry</th><th>Avg Exit</th><th>P/L $</th><th>P/L %</th></tr></thead>
        <tbody>
          ${rows.map(r=>`<tr>
            <td class="mono" style="color:var(--t3)">${fmtDate(r[0])}</td>
            <td style="font-weight:500;font-family:monospace">${r[1]||'—'}</td>
            <td class="mono" style="color:var(--t2)">${r[2]||'—'}</td>
            <td class="mono">${r[3]||'—'}</td>
            <td>${sideTag(r[4])}</td>
            <td class="mono" style="color:var(--t3)">${fmtDate(r[5])}</td>
            <td class="mono">$${parseFloat(r[6]).toFixed(2)}</td>
            <td class="mono">$${parseFloat(r[7]).toFixed(2)}</td>
            <td class="mono ${parseFloat(r[8])>=0?'pos':'neg'}">${fmt(r[8])}</td>
            <td class="mono ${parseFloat(r[9])>=0?'pos':'neg'}">${fmtPct(r[9])}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

async function submitTrade(){
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('form-msg');
  btn.disabled=true;
  msg.textContent='Submitting...';
  msg.className='form-msg';

  let payload;
  if(mode==='futures'){
    payload={
      type:'futures',
      date:document.getElementById('f-date').value,
      ticker:document.getElementById('f-ticker').value,
      tradeNum:document.getElementById('f-tradenum').value,
      legType:document.getElementById('f-type').value,
      side:document.getElementById('f-side').value,
      price:document.getElementById('f-price').value,
      qty:document.getElementById('f-qty').value,
      matchRow:document.getElementById('f-matchrow').value,
      setup:document.getElementById('f-setup').value,
      notes:document.getElementById('f-notes').value,
      exec:document.getElementById('f-exec').value,
    };
  } else {
    payload={
      type:'options',
      date:document.getElementById('o-date').value,
      ticker:document.getElementById('o-ticker').value,
      qty:document.getElementById('o-qty').value,
      strike:document.getElementById('o-strike').value,
      side:document.getElementById('o-side').value,
      exp:document.getElementById('o-exp').value,
      avgEntry:document.getElementById('o-entry').value,
      avgExit:document.getElementById('o-exit').value,
      setup:document.getElementById('o-setup').value,
      notes:document.getElementById('o-notes').value,
      exec:document.getElementById('o-exec').value,
    };
  }

  try{
    await fetch(SCRIPT_URL,{
      method:'POST',
      body:JSON.stringify(payload),
      headers:{'Content-Type':'application/json'},
      mode:'no-cors'
    });
    msg.textContent='✓ Submitted — syncing...';
    msg.className='form-msg ok';
    setTimeout(()=>{ loadData(); msg.textContent=''; btn.disabled=false; },1500);
  }catch(e){
    msg.textContent='Error — check connection';
    msg.className='form-msg err';
    btn.disabled=false;
  }
}

loadData();
</script>
</body>
</html>
